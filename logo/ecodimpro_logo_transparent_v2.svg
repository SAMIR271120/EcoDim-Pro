<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="leftHalf">
      <rect x="156" y="156" width="100" height="200"/>
    </clipPath>
    <clipPath id="rightHalf">
      <rect x="256" y="156" width="100" height="200"/>
    </clipPath>
  </defs>

  <!-- Rayons alternes ambre / sarcelle -->
  <g>
    <rect x="249" y="66" width="14" height="66" rx="7" fill="#E8A33D" transform="rotate(0 256 256)"/>
    <rect x="249" y="66" width="14" height="66" rx="7" fill="#3DBFAE" transform="rotate(45 256 256)"/>
    <rect x="249" y="66" width="14" height="66" rx="7" fill="#E8A33D" transform="rotate(90 256 256)"/>
    <rect x="249" y="66" width="14" height="66" rx="7" fill="#3DBFAE" transform="rotate(135 256 256)"/>
    <rect x="249" y="66" width="14" height="66" rx="7" fill="#E8A33D" transform="rotate(180 256 256)"/>
    <rect x="249" y="66" width="14" height="66" rx="7" fill="#3DBFAE" transform="rotate(225 256 256)"/>
    <rect x="249" y="66" width="14" height="66" rx="7" fill="#E8A33D" transform="rotate(270 256 256)"/>
    <rect x="249" y="66" width="14" height="66" rx="7" fill="#3DBFAE" transform="rotate(315 256 256)"/>
  </g>

  <!-- Disque central : moitie ambre (electrique) / moitie sarcelle (thermique) -->
  <circle cx="256" cy="256" r="90" fill="#E8A33D" clip-path="url(#leftHalf)"/>
  <circle cx="256" cy="256" r="90" fill="#3DBFAE" clip-path="url(#rightHalf)"/>
</svg>
